<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSARMS - Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f7fb;
}

/* HERO SECTION */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px;
    height:100vh;
}

/* LEFT TEXT */
.hero-text{
    width:50%;
}

.hero-text h1{
    font-size:42px;
    color:#1f2d3d;
    margin-bottom:20px;
}

.hero-text h1 span{
    color:#2ecc71, #2c3f55;;
}

.hero-text p{
    font-size:18px;
    color:#555;
    margin-bottom:30px;
    line-height:1.6;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    background: #2c3f55;;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-size:16px;
}

.btn:hover{
    background: #2c3f55;;
}

/* RIGHT IMAGE */
.hero-image{
    width:50%;
    text-align:center;
}

.hero-image img{
    width:90%;
    max-width:500px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-text, .hero-image{
        width:100%;
    }

    .hero-image{
        margin-top:30px;
    }
}
</style>

</head>

<body>

<div class="hero">

    <!-- LEFT SIDE TEXT -->
    <div class="hero-text">
        <h1>
            Welcome to <br>
            <span>SSARMS</span>
        </h1>

        <p>
            Secondary School Academic Record Management System helps schools
            manage student records, marks, results, and reports efficiently in a
            digital environment.
        </p>

        <a href="auth/login.php" class="btn">Get Started</a>
    </div>

    <!-- RIGHT SIDE IMAGE -->
    <div class="hero-image">
        <img src="images/you.jpg">
    </div>

</div>

</body>
</html>
